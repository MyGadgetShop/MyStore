<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gadget Shop</title>

    <link rel="icon" href="Gadget Shop-horizontal.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }
      body {
        background: #0b0f19;
        color: white;
      }

      /* 🔥 Wrapper */
    .wrapper {
  max-width: 100%;
  padding: 0 40px;



  
}




      /* 🔝 NAVBAR */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 0;
      }

      .left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-img {
        height:200px;
      }

      .site-name {
        font-weight: bold;
      }

      .search-box {
        display: flex;
        width: 300px;
      }

      .search-box input {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 8px 0 0 8px;
      }

      .search-box button {
        padding: 8px 12px;
        border: none;
        background: #22c55e;
        border-radius: 0 8px 8px 0;
      }

      .icons {
  font-size: 26px; /* كبر السلة */
  position: relative;
}

      /* 📂 Categories */
      .categories {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }

      .categories button {
        padding: 8px 15px;
        border: none;
        border-radius: 20px;
        background: #111827;
        color: white;
      }

      /* 🔥 HERO */
      .hero {
        height: 260px;
        border-radius: 20px;
        background: url("https://images.unsplash.com/photo-1519389950473-47ba0277781c")
          center/cover;
        position: relative;
        display: flex;
        align-items: center;
        margin: 20px 0;
        width: 100%;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 20px;
      }

      .hero-content {
        position: relative;
        z-index: 1;
        padding: 30px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .hero-btn {
        display: inline-block;
        margin-top: 10px;
        background: #22c55e;
        padding: 10px 15px;
        border-radius: 8px;
        color: black;
        text-decoration: none;
      }

      /* 🛍️ PRODUCTS */
      .container {
         display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
      }

      .card {
        background: #111827;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #1f2937;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-5px);
        border-color: #22c55e;
      }

      .card img {
        width: 100%;
        height: 200px;
        object-fit: contain;
      }

      .price {
        color: #22c55e;
        margin: 10px 0;
      }

      .btn {
        display: block;
        text-align: center;
        padding: 10px;
        background: #22c55e;
        border-radius: 8px;
        color: black;
        text-decoration: none;
      }

      /* 🔻 FOOTER */
      .footer {
        background: #020617;
        margin-top: 40px;
        padding: 40px 20px;
      }

      .footer-content {
        display: flex;
        justify-content: space-between;
        gap: 30px;
      }

      .col {
        max-width: 300px;
      }

      .col p {
        color: #ccc;
        margin: 5px 0;
      }

      .pay-icons {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .pay-icons img {
        height: 30px;
        background: white;
        padding: 5px;
        border-radius: 6px;
      }

      .footer-logo {
        text-align: center;
        margin-top: 20px;
        height:100px;
      }

      .footer-logo img {
        height: 300px;   /* كبرناه */
  max-width: 250px;

      }

      .footer-bottom {
        text-align: center;
        margin-top: 10px;
        color: #777;
      }

      /* 📱 Responsive */
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          gap: 10px;
        }

        .search-box {
          width: 100%;
        }

        .container {
          grid-template-columns: 1fr;
        }

        .footer-content {
          flex-direction: column;
        }

        .buttons {
          display: flex;
          gap: 10px; /* المسافة بين الأزرار */
          margin-top: 20px;
          
        }
      }

.btn:focus,
.btn:hover {
  box-shadow: 0 0 10px #22c55e;
  transform: scale(1.03);
  transition: 0.2s;
}
        .btn {
          padding: 10px 20px;
          border: none;
          border-radius: 8px;
          font-weight: bold;
          cursor: pointer;
        }

        /* زر الشراء */
        .buy {
          background: #22c55e;
          color: black;
        }

        /* زر السلة */
        .cart {
          background: #1f2937;
          color: white;
        }

            





        .toast {
  position: fixed;
  top: 20px;
  right: 20px;

  background: #111827;
  color: white;

  padding: 12px 20px;
  border-radius: 8px;

  box-shadow: 0 0 10px rgba(0,0,0,0.3);

  opacity: 0;
  transform: translateY(-20px);

  transition: 0.3s;
}

/* لما يظهر */
.toast.show {
  opacity: 1;
  transform: translateY(0);
}


   









/* 💻 تكبير الكمبيوتر */
@media (min-width: 1200px){

  .hero {
    height: 380px;
  }

  .hero h1 {
    font-size: 42px;
  }

  .search-box {
    width:600px;
  }

  .container {
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
  }

  .card {
    padding: 30px;
  }

  .card img {
    height: 250px;
  }

  .btn {
    padding: 14px;
    font-size: 16px;
  }


  .search-box input {
    padding: 12px;
    font-size: 16px;
  }

  .search-box button {
    padding: 12px 20px;
  }


  

}



.cart-box {
  position: relative;
  display: inline-block;
}

/* رقم السلة */
.count {
  position: absolute;
  top: -6px;
  right: -6px;

  background: red;
  color: white;

  font-size: 11px;
  padding: 3px 6px;
  border-radius: 50%;

  min-width: 18px;
  text-align: center;
}



.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;

  width: 55px;
  height: 55px;

  background: #25D366;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 12px rgba(0,0,0,0.4);

  z-index: 999;
}

.whatsapp img {
  width: 28px;
}

/* حركة */
.whatsapp:hover {
  transform: scale(1.1);
  transition: 0.2s;
}


.nav-icons {
  display: flex;
  align-items: center;
  gap: 15px;
}

.user-icon {
  font-size: 26px;
  cursor: pointer;
  transition: 0.2s;
}

.user-icon:hover {
  color: #22c55e;
  transform: scale(1.1);
}



    </style>
  </head>

  <body>

      <!-- 🔝 NAVBAR -->

</div>
      </div>

      </div>

      <!-- 🛍️ PRODUCTS -->
      <div class="container">

<div class="buttons">

</div>


      
      </div>


    </div>

    <div class="toast" id="toast">
  تمت إضافة المنتج إلى السلة 🛒
</div>

    <!-- 🔻 FOOTER -->
    <footer class="footer">
      <div class="wrapper">
        <div class="footer-content">
          <div class="col">
            <h3>Gadget Shop</h3>
            <p>متجر متخصص في الإلكترونيات الحديثة والشواحن السريعة.</p>
          </div>

          <div class="col">
            <h3>تواصل</h3>

          </div>

          <div class="col">

              <img src="https://img.icons8.com/color/48/mada.png" />

            </div>
          </div>
        </div>

       

        <div class="footer-bottom">© 2026 Gadget Shop</div>
      </div>
    </footer>

  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

  </body>
</html>
