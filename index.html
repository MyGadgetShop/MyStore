<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>متجري</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f5f5f5;
      }

      header {
        background: #111;
        color: white;
        padding: 15px;
        text-align: center;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.05);
      }

      img {
        width: 100%;
        border-radius: 10px;
      }

      h3 {
        margin: 10px 0;
      }

      button {
        background: black;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #444;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🛒 متجري</h1>
    </header>

    <div class="container">
      <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>منتج 1</h3>
        <p>100 ريال</p>
        <button>أضف للسلة</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>منتج 2</h3>
        <p>150 ريال</p>
        <button>أضف للسلة</button>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>منتج 3</h3>
        <p>200 ريال</p>
        <button>أضف للسلة</button>
      </div>
    </div>
  </body>
</html>
