<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gadget Shop</title>

    <link rel="icon" href="Gadget Shop-horizontal.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }
      body {
        background: #0b0f19;
        color: white;
      }

      /* 🔥 Wrapper */
      .wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* 🔝 NAVBAR */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 0;
      }

      .left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-img {
        height: 50px;
      }

      .site-name {
        font-weight: bold;
      }

      .search-box {
        display: flex;
        width: 300px;
      }

      .search-box input {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 8px 0 0 8px;
      }

      .search-box button {
        padding: 8px 12px;
        border: none;
        background: #22c55e;
        border-radius: 0 8px 8px 0;
      }

      .icons {
        font-size: 20px;
      }

      /* 📂 Categories */
      .categories {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }

      .categories button {
        padding: 8px 15px;
        border: none;
        border-radius: 20px;
        background: #111827;
        color: white;
      }

      /* 🔥 HERO */
      .hero {
        height: 260px;
        border-radius: 20px;
        background: url("https://images.unsplash.com/photo-1519389950473-47ba0277781c")
          center/cover;
        position: relative;
        display: flex;
        align-items: center;
        margin: 20px 0;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 20px;
      }

      .hero-content {
        position: relative;
        z-index: 1;
        padding: 30px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .hero-btn {
        display: inline-block;
        margin-top: 10px;
        background: #22c55e;
        padding: 10px 15px;
        border-radius: 8px;
        color: black;
        text-decoration: none;
      }

      /* 🛍️ PRODUCTS */
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        margin: 30px 0;
      }

      .card {
        background: #111827;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #1f2937;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-5px);
        border-color: #22c55e;
      }

      .card img {
        width: 100%;
        height: 200px;
        object-fit: contain;
      }

      .price {
        color: #22c55e;
        margin: 10px 0;
      }

      .btn {
        display: block;
        text-align: center;
        padding: 10px;
        background: #22c55e;
        border-radius: 8px;
        color: black;
        text-decoration: none;
      }

      /* 🔻 FOOTER */
      .footer {
        background: #020617;
        margin-top: 40px;
        padding: 40px 20px;
      }

      .footer-content {
        display: flex;
        justify-content: space-between;
        gap: 30px;
        flex-wrap: wrap;
      }

      .col {
        max-width: 300px;
      }

      .col p {
        color: #ccc;
        margin: 5px 0;
      }

      .pay-icons {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .pay-icons img {
        height: 30px;
        background: white;
        padding: 5px;
        border-radius: 6px;
      }

      .footer-logo {
        text-align: center;
        margin-top: 20px;
      }

      .footer-logo img {
        height: 300px;
      }

      .footer-bottom {
        text-align: center;
        margin-top: 10px;
        color: #777;
      }

      /* 📱 Responsive */
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          gap: 10px;
        }

        .search-box {
          width: 100%;
        }

        .container {
          grid-template-columns: 1fr;
        }

        .footer-content {
          flex-direction: column;
        }
      }

       .hoverr{

               hover

       }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <!-- 🔝 NAVBAR -->
      <div class="navbar">
        <div class="left">
          <img src="Gadget Shop-logo-transparent.png" class="logo-img" />
          <span class="site-name">Gadget Shop</span>
        </div>

        <div class="search-box">
          <input type="text" placeholder="ابحث..." />
          <button>بحث</button>
        </div>

        <div class="icons">❤️ 🛒</div>
      </div>

      <!-- 📂 Categories -->
      <div class="categories">
        <button>جوالات</button>
        <button>لابتوبات</button>
        <button>سماعات</button>
      </div>

      <!-- 🔥 HERO -->
      <div class="hero">
        <div class="hero-content">
          <h1>أحدث الإلكترونيات</h1>
          <p>أفضل العروض على الشواحن السريعة</p>
          <a href="#" class="hero-btn">تسوق الآن</a>
        </div>
      </div>

      <!-- 🛍️ PRODUCTS -->
      <div class="container">
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
          />
          <h3>جوال</h3>
          <div class="price">1200 ريال</div>
          <a href="#" class="btn">عرض</a>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
          />
          <h3>لابتوب</h3>
          <div class="price">3500 ريال</div>
          <a href="products.html" class="btn">عرض</a>
        </div>
      </div>
    </div>

    <!-- 🔻 FOOTER -->
    <footer class="footer">
      <div class="wrapper">
        <div class="footer-content">
          <div class="col">
            <h3>Gadget Shop</h3>
            <p>متجر متخصص في الإلكترونيات الحديثة والشواحن السريعة.</p>
          </div>

          <div class="col">
            <h3>تواصل</h3>
            <p>📱 05XXXXXXXX</p>
            <p>📧 example@email.com</p>
          </div>

          <div class="col">
            <h3>الدفع</h3>
            <div class="pay-icons">
              <img src="https://img.icons8.com/color/48/mada.png" />
              <img src="https://img.icons8.com/color/48/visa.png" />
              <img src="https://img.icons8.com/color/48/mastercard.png" />
            </div>
          </div>
        </div>

        <div class="footer-logo">
          <img src="Gadget Shop-logo-transparent.png" />
        </div>

        <div class="footer-bottom">© 2026 Gadget Shop</div>
      </div>
    </footer>

    <script></script>
  </body>
</html>
