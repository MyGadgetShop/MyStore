<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>متجر إلكترونيات</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
      }

      header {
        text-align: center;
        padding: 25px;
        font-size: 24px;
        font-weight: bold;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 25px;
        padding: 20px;
      }

      /* 🔥 الكرت */
      .card {
        perspective: 1000px;
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 350px;
        transition: transform 0.7s;
        transform-style: preserve-3d;
      }

      .card:hover .card-inner {
        transform: rotateY(180deg);
      }

      /* الوجهين */
      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        backface-visibility: hidden;
        overflow: hidden;
      }

      /* الأمام */
      .card-front {
        background: #111827;
        padding: 15px;
        text-align: center;
        border: 1px solid #1f2937;
      }

      .card-front img {
        width: 100%;
        height: 200px;
        object-fit: contain;
      }

      .card-front h3 {
        margin-top: 10px;
      }

      /* الخلف */
      .card-back {
        background: #1e293b;
        transform: rotateY(180deg);
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }

      .price {
        color: #22c55e;
        font-size: 20px;
        font-weight: bold;
      }

      button {
        padding: 12px 20px;
        border: none;
        background: #22c55e;
        color: black;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: #16a34a;
      }

      /* 📱 موبايل */
      @media (max-width: 600px) {
        .card-inner {
          height: 300px;
        }
      }
    </style>
  </head>

  <body>
    <header>⚡ متجر إلكترونيات احترافي</header>

    <div class="container">
      <div class="card">
        <div class="card-inner">
          <div class="card-front">
            <img
              src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
            />
            <h3>جوال ذكي</h3>
          </div>

          <div class="card-back">
            <div class="price">1200 ريال</div>
            <button>أضف للسلة</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-inner">
          <div class="card-front">
            <img
              src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
            />
            <h3>لابتوب</h3>
          </div>

          <div class="card-back">
            <div class="price">3500 ريال</div>
            <button>أضف للسلة</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
